server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html so client-side routes (e.g. /users,
    # /login) work on direct navigation and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
